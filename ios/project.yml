name: PowerAI
options:
  bundleIdPrefix: com.powerai
  createIntermediateGroups: true
  deploymentTarget:
    iOS: 16.0
  xcodeVersion: 14.0
  indentWidth: 2
  tabWidth: 2
  usesTabs: false

settings:
  base:
    DEVELOPMENT_TEAM: "" # Your team ID here
    SWIFT_VERSION: 5.0
    TARGETED_DEVICE_FAMILY: "1,2" # Universal (iPhone & iPad)

targets:
  PowerAI:
    type: application
    platform: iOS
    sources:
      - path: App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.powerai.app
        INFOPLIST_FILE: App/Info.plist
    info:
      path: App/Info.plist
      properties:
        CFBundleName: PowerAI
        CFBundleDisplayName: PowerAI
        CFBundlePackageType: APPL
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchStoryboardName: LaunchScreen
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiredDeviceCapabilities:
          - armv7
        UIApplicationSupportsIndirectInputEvents: true

    # Organize files in Xcode project navigator
    scheme:
      environmentVariables:
        SWIFT_DEBUG_LOGGING: YES
      profile:
        config: Release
      analyze:
        config: Debug
      archive:
        config: Release
